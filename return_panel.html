<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-pills .nav-link.active { background-color: #dc3545; } /* Red for returns */
        .nav-pills .nav-link { color: #495057; cursor: pointer; }
        .total-box { background: #ffebee; border-radius: 8px; padding: 15px; text-align: center; }
        .total-box h3 { color: #c62828; margin: 0; font-weight: 700; }
        .search-list { position: absolute; z-index: 1000; width: 100%; max-height: 200px; overflow-y: auto; display: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-secondary"><i class="bi bi-arrow-return-left me-2"></i>Product Returns</h3>
            <a href="dashboard.html" class="btn btn-outline-secondary"><i class="bi bi-house me-1"></i> Dashboard</a>
        </div>

        <div class="row">
            <!-- LEFT: Input & Selection -->
            <div class="col-lg-7">
                <div class="card p-3 h-100">
                    <ul class="nav nav-pills mb-3 nav-fill" id="pills-tab">
                        <li class="nav-item"><a class="nav-link active" id="tab-bill" onclick="switchTab('bill')">Return by Bill</a></li>
                        <li class="nav-item"><a class="nav-link" id="tab-manual" onclick="switchTab('manual')">Manual Return (No Bill)</a></li>
                    </ul>

                    <!-- VIEW 1: BY BILL -->
                    <div id="view-bill">
                        <div class="input-group mb-3">
                            <input type="number" id="searchBillId" class="form-control" placeholder="Enter Bill ID (e.g., 105)">
                            <button class="btn btn-primary" onclick="searchBill()"><i class="bi bi-search"></i> Load Bill</button>
                        </div>
                        <div id="billInfo" class="alert alert-info d-none"></div>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Product</th>
                                        <th>Sold Qty</th>
                                        <th>Price</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="billItemsTable">
                                    <tr><td colspan="4" class="text-center text-muted">Enter Bill ID to load items.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- VIEW 2: MANUAL -->
                    <div id="view-manual" class="d-none">
                        <div class="position-relative mb-3">
                            <label class="form-label">Search Product</label>
                            <input type="text" id="manualSearchInput" class="form-control" placeholder="Type name or code..." autocomplete="off">
                            <ul class="list-group search-list shadow" id="manualSearchResults"></ul>
                        </div>
                        <p class="text-muted small">Search and select items manually if the customer lost the bill.</p>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Return Cart -->
            <div class="col-lg-5">
                <div class="card h-100">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">Return Summary</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="table-responsive flex-grow-1" style="max-height: 400px; overflow-y: auto;">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Item</th>
                                        <th>Qty</th>
                                        <th>Condition</th>
                                        <th>Refund</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="returnCartBody"></tbody>
                            </table>
                        </div>
                        
                        <div class="mt-auto">
                            <div class="total-box mb-3">
                                <small class="text-muted text-uppercase">Total Refund Amount</small>
                                <h3 id="totalRefundDisplay">Rs. 0.00</h3>
                            </div>
                            <button class="btn btn-danger w-100 py-2 fw-bold" onclick="processReturn()">
                                <i class="bi bi-check-circle me-2"></i> Confirm Return
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1050;" id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentMode = 'bill'; // 'bill' or 'manual'
        let returnCart = [];
        let currentOriginalSaleId = null;

        // --- Tab Switching ---
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            
            document.getElementById('view-bill').classList.toggle('d-none', mode !== 'bill');
            document.getElementById('view-manual').classList.toggle('d-none', mode !== 'manual');
            
            // Clear data on switch
            returnCart = [];
            currentOriginalSaleId = null;
            updateReturnCartUI();
            document.getElementById('billInfo').classList.add('d-none');
            document.getElementById('billItemsTable').innerHTML = '<tr><td colspan="4" class="text-center text-muted">Enter Bill ID to load items.</td></tr>';
        }

        // --- Bill Logic ---
        async function searchBill() {
            const billId = document.getElementById('searchBillId').value;
            if (!billId) return showAlert('Please enter a Bill ID', 'warning');

            try {
                const res = await fetch(`sales.php?action=getSaleDetails&sale_id=${billId}`);
                const data = await res.json();

                if (data.success) {
                    currentOriginalSaleId = billId;
                    const infoDiv = document.getElementById('billInfo');
                    infoDiv.innerHTML = `<strong>Bill #${data.sale.sale_id}</strong> | Date: ${data.sale.sale_date} | Total: Rs. ${data.sale.total_amount}`;
                    infoDiv.classList.remove('d-none');

                    const tbody = document.getElementById('billItemsTable');
                    tbody.innerHTML = data.items.map(item => `
                        <tr>
                            <td>${item.name}</td>
                            <td>${item.qty}</td>
                            <td>Rs. ${parseFloat(item.price).toFixed(2)}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-danger" 
                                onclick='addToReturnCart(${JSON.stringify(item).replace(/'/g, "&#39;")}, "bill")'>
                                    Select
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    showAlert(data.message, 'danger');
                }
            } catch (e) {
                showAlert('Error fetching bill.', 'danger');
            }
        }

        // --- Manual Logic ---
        document.getElementById('manualSearchInput').addEventListener('input', async function() {
            const query = this.value;
            const list = document.getElementById('manualSearchResults');
            
            if (query.length < 2) { list.style.display = 'none'; return; }

            const res = await fetch(`returns.php?action=searchProducts&q=${query}`);
            const data = await res.json();

            if (data.success && data.products.length > 0) {
                list.innerHTML = data.products.map(p => `
                    <li class="list-group-item list-group-item-action cursor-pointer" onclick='selectManualProduct(${JSON.stringify(p)})'>
                        <div class="d-flex justify-content-between">
                            <strong>${p.name}</strong>
                            <small>Rs. ${parseFloat(p.price).toFixed(2)}</small>
                        </div>
                        <small class="text-muted">${p.product_code}</small>
                    </li>
                `).join('');
                list.style.display = 'block';
            } else {
                list.style.display = 'none';
            }
        });

        function selectManualProduct(product) {
            // Map product structure to match bill item structure for consistency
            const item = {
                product_id: product.product_id,
                name: product.name,
                price: product.price,
                qty: 1 // Default
            };
            addToReturnCart(item, 'manual');
            document.getElementById('manualSearchInput').value = '';
            document.getElementById('manualSearchResults').style.display = 'none';
        }

        // --- Cart Logic ---
        function addToReturnCart(item, source) {
            // Check if already in cart
            const existing = returnCart.find(i => i.product_id == item.product_id);
            if (existing) return showAlert('Item already in return list.', 'warning');

            returnCart.push({
                product_id: item.product_id,
                name: item.name,
                returnQty: 1,
                maxQty: source === 'bill' ? parseInt(item.qty) : 9999,
                refundPrice: parseFloat(item.price),
                condition: 'Good' // Default
            });
            updateReturnCartUI();
        }

        function updateReturnCartUI() {
            const tbody = document.getElementById('returnCartBody');
            let total = 0;

            tbody.innerHTML = returnCart.map((item, index) => {
                const lineTotal = item.returnQty * item.refundPrice;
                total += lineTotal;
                
                return `
                <tr>
                    <td>
                        <div class="fw-bold">${item.name}</div>
                        <input type="number" class="form-control form-control-sm mt-1" 
                               value="${item.refundPrice}" 
                               onchange="updateCartItem(${index}, 'price', this.value)" 
                               placeholder="Refund Price">
                    </td>
                    <td style="width: 80px;">
                        <input type="number" class="form-control form-control-sm" 
                               value="${item.returnQty}" min="1" max="${item.maxQty}"
                               onchange="updateCartItem(${index}, 'qty', this.value)">
                        <small class="text-muted">Max: ${item.maxQty}</small>
                    </td>
                    <td>
                        <select class="form-select form-select-sm ${item.condition === 'Good' ? 'text-success border-success' : 'text-danger border-danger'}" 
                                onchange="updateCartItem(${index}, 'condition', this.value)">
                            <option value="Good" ${item.condition === 'Good' ? 'selected' : ''}>Good (Restock)</option>
                            <option value="Damaged" ${item.condition === 'Damaged' ? 'selected' : ''}>Damaged (Discard)</option>
                        </select>
                    </td>
                    <td class="fw-bold text-end">Rs. ${lineTotal.toFixed(2)}</td>
                    <td><button class="btn btn-sm text-danger" onclick="removeFromCart(${index})"><i class="bi bi-x-lg"></i></button></td>
                </tr>
                `;
            }).join('');

            if(returnCart.length === 0) tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No items selected.</td></tr>';
            
            document.getElementById('totalRefundDisplay').textContent = `Rs. ${total.toFixed(2)}`;
        }

        window.updateCartItem = function(index, field, value) {
            if (field === 'qty') {
                let v = parseInt(value);
                if (v < 1) v = 1;
                if (v > returnCart[index].maxQty) v = returnCart[index].maxQty;
                returnCart[index].returnQty = v;
            } else if (field === 'price') {
                returnCart[index].refundPrice = parseFloat(value) || 0;
            } else if (field === 'condition') {
                returnCart[index].condition = value;
            }
            updateReturnCartUI();
        }

        window.removeFromCart = function(index) {
            returnCart.splice(index, 1);
            updateReturnCartUI();
        }

        // --- Process Return ---
        window.processReturn = async function() {
            if (returnCart.length === 0) return showAlert('Return list is empty.', 'warning');
            
            const userId = localStorage.getItem('user_id');
            const total = returnCart.reduce((sum, item) => sum + (item.returnQty * item.refundPrice), 0);

            if (!confirm(`Confirm return of Rs. ${total.toFixed(2)}? This will be deducted from the Cash Drawer.`)) return;

            const payload = {
                user_id: userId,
                original_sale_id: currentOriginalSaleId,
                total_refund: total,
                items: returnCart.map(i => ({
                    product_id: i.product_id,
                    quantity: i.returnQty,
                    refund_amount: i.returnQty * i.refundPrice,
                    condition: i.condition
                }))
            };

            try {
                const res = await fetch('returns.php?action=processReturn', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.success) {
                    showAlert('Return processed successfully!', 'success');
                    returnCart = [];
                    currentOriginalSaleId = null;
                    updateReturnCartUI();
                    if(currentMode === 'bill') document.getElementById('searchBillId').value = '';
                } else {
                    showAlert(data.message, 'danger');
                }
            } catch (e) {
                showAlert('Network error processing return.', 'danger');
            }
        }

        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = `alert alert-${type} alert-dismissible fade show shadow`;
            div.innerHTML = `${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            document.getElementById('alertContainer').appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
    </script>
</body>
</html>
