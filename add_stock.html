<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .search-results {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border: 1px solid #dee2e6; border-radius: 0.5rem;
            max-height: 250px; overflow-y: auto; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none;
        }
        .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
        .search-item:hover { background-color: #f8f9fa; }
        .table-input { min-width: 80px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0"><i class="bi bi-box-seam-fill me-2"></i>Add Stock</h2>
            <button class="btn btn-success btn-lg" id="saveStockBtn"><i class="bi bi-check-lg me-1"></i> Confirm & Save</button>
        </div>

        <!-- Search Section -->
        <div class="card mb-4 p-3">
            <div class="position-relative">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" class="form-control border-start-0" id="stockSearchInput" placeholder="Scan Barcode, Type Product Name or Item Code..." autocomplete="off">
                </div>
                <div class="search-results" id="stockSearchResults"></div>
            </div>
        </div>

        <!-- Stock List Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Item Code</th>
                                <th>Product Name</th>
                                <th>Current Stock</th>
                                <th style="width: 150px;">Add Qty</th>
                                <th style="width: 150px;">Update Cost</th>
                                <th>New Total</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody">
                            <tr id="emptyRow"><td colspan="7" class="text-center py-5 text-muted">Scan or search products to add them to the list.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
        <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">Stock updated successfully!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let products = [];
        let stockList = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            
            const searchInput = document.getElementById('stockSearchInput');
            const searchResults = document.getElementById('stockSearchResults');

            // 1. Search Logic
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                searchResults.innerHTML = '';
                
                if (query.length === 0) {
                    searchResults.style.display = 'none';
                    return;
                }

                // Check for exact match (Auto Add)
                const exactMatch = products.find(p => 
                    p.product_code.toLowerCase() === query || 
                    (p.item_code && p.item_code.toLowerCase() === query)
                );

                if (exactMatch) {
                    addToList(exactMatch);
                    searchInput.value = '';
                    searchResults.style.display = 'none';
                    return;
                }

                // Filter Results
                const matches = products.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.product_code.toLowerCase().includes(query) || 
                    (p.item_code && p.item_code.toLowerCase().includes(query))
                ).slice(0, 10);

                if (matches.length > 0) {
                    matches.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'search-item';
                        div.innerHTML = `
                            <div class="d-flex justify-content-between">
                                <strong>${p.name}</strong>
                                <span class="badge bg-secondary">${p.product_code}</span>
                            </div>
                            <small class="text-muted">Stock: ${p.quantity}</small>
                        `;
                        div.onclick = () => {
                            addToList(p);
                            searchInput.value = '';
                            searchResults.style.display = 'none';
                        };
                        searchResults.appendChild(div);
                    });
                    searchResults.style.display = 'block';
                } else {
                    searchResults.style.display = 'none';
                }
            });

            // Hide search results on click outside
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.style.display = 'none';
                }
            });

            // 2. Save Button Logic
            document.getElementById('saveStockBtn').addEventListener('click', saveStock);
        });

        async function loadProducts() {
            try {
                const res = await fetch('products.php?action=getAllProducts');
                const data = await res.json();
                if (data.success) products = data.products;
            } catch (err) { console.error('Error loading products', err); }
        }

        function addToList(product) {
            // Check if already in list
            if (stockList.find(i => i.product_id === product.product_id)) {
                showToast('Product already in list', 'bg-warning');
                return;
            }

            stockList.push({ ...product, add_qty: 1, new_cost: '' }); // Default qty 1
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';

            if (stockList.length === 0) {
                tbody.innerHTML = '<tr id="emptyRow"><td colspan="7" class="text-center py-5 text-muted">Scan or search products to add them to the list.</td></tr>';
                return;
            }

            stockList.forEach((item, index) => {
                const currentStock = parseInt(item.quantity);
                const addQty = parseInt(item.add_qty) || 0;
                const newTotal = currentStock + addQty;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.item_code || '-'}</td>
                    <td class="fw-bold">${item.name}</td>
                    <td><span class="badge bg-secondary">${currentStock}</span></td>
                    <td>
                        <input type="number" class="form-control table-input qty-input" value="${item.add_qty}" min="1" data-index="${index}">
                    </td>
                    <td>
                        <input type="number" class="form-control table-input cost-input" value="${item.new_cost}" placeholder="${item.price || '0.00'}" data-index="${index}">
                    </td>
                    <td class="fw-bold text-success">${newTotal}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-danger" onclick="removeFromList(${index})"><i class="bi bi-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Attach listeners
            document.querySelectorAll('.qty-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    stockList[e.target.dataset.index].add_qty = parseInt(e.target.value);
                    renderTable();
                });
            });
            document.querySelectorAll('.cost-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    stockList[e.target.dataset.index].new_cost = e.target.value;
                });
            });
            
            // Auto focus on the last added qty input if there is one
            // const inputs = document.querySelectorAll('.qty-input');
            // if(inputs.length > 0) inputs[inputs.length - 1].focus();
        }

        window.removeFromList = function(index) {
            stockList.splice(index, 1);
            renderTable();
        }

        async function saveStock() {
            if (stockList.length === 0) {
                showToast('List is empty!', 'bg-warning');
                return;
            }

            // Prepare Data
            const itemsToSave = stockList.map(item => ({
                product_id: item.product_id,
                quantity_to_add: item.add_qty, // Maps to logic in stock.php (single) or new bulk logic
                add_qty: item.add_qty,         // Maps to new bulk logic
                new_cost: item.new_cost
            }));

            try {
                const res = await fetch('stock.php?action=bulkAddStock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: itemsToSave })
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Stock updated successfully!');
                    stockList = [];
                    renderTable();
                    loadProducts(); // Refresh base data
                } else {
                    showToast(data.message, 'bg-danger');
                }
            } catch (err) {
                showToast('Failed to save stock.', 'bg-danger');
            }
        }

        function showToast(msg, bgClass = 'bg-success') {
            const toastEl = document.getElementById('liveToast');
            const toastBody = document.getElementById('toastMessage');
            toastEl.className = `toast align-items-center text-white border-0 ${bgClass}`;
            toastBody.textContent = msg;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }
    </script>
</body>
</html>
