<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Stock Alert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .badge-critical { background-color: #dc3545; color: white; }
        .badge-warning { background-color: #ffc107; color: #212529; }
        .table-hover tbody tr:hover { background-color: #fff3cd; } /* Highlight row on hover */
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-danger mb-1"><i class="bi bi-exclamation-triangle-fill me-2"></i>Low Stock Alert</h2>
                <p class="text-muted small mb-0">Products with stock level 3 or less.</p>
            </div>
            <button class="btn btn-outline-success" onclick="exportLowStock()"><i class="bi bi-file-earmark-spreadsheet"></i> Export CSV</button>
        </div>

        <div class="card p-3 mb-4">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="searchInput" placeholder="Search low stock items...">
                    </div>
                </div>
                <div class="col-md-4">
                    <select class="form-select" id="sortSelect">
                        <option value="qty_asc" selected>Sort by Stock: Low to High</option>
                        <option value="qty_desc">Sort by Stock: High to Low</option>
                        <option value="name_asc">Sort by Name: A-Z</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Item Code</th>
                                <th>Product Name</th>
                                <th>Barcode</th>
                                <th>Cost (LKR)</th>
                                <th>Stock Level</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody">
                            <tr><td colspan="6" class="text-center py-5 text-muted">Loading low stock data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lowStockItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchLowStock();

            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                filterAndRender(e.target.value, document.getElementById('sortSelect').value);
            });

            document.getElementById('sortSelect').addEventListener('change', (e) => {
                filterAndRender(document.getElementById('searchInput').value, e.target.value);
            });
        });

        async function fetchLowStock() {
            try {
                const res = await fetch('products.php?action=getLowStock');
                const data = await res.json();
                if (data.success) {
                    lowStockItems = data.products;
                    filterAndRender('', 'qty_asc'); // Initial render
                } else {
                    document.getElementById('stockTableBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">${data.message}</td></tr>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('stockTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">Network Error</td></tr>';
            }
        }

        function filterAndRender(query, sortKey) {
            let filtered = lowStockItems.filter(p => 
                p.name.toLowerCase().includes(query.toLowerCase()) || 
                p.product_code.toLowerCase().includes(query.toLowerCase()) ||
                (p.item_code && p.item_code.toLowerCase().includes(query.toLowerCase()))
            );

            // Sorting
            filtered.sort((a, b) => {
                if (sortKey === 'qty_asc') return parseInt(a.quantity) - parseInt(b.quantity);
                if (sortKey === 'qty_desc') return parseInt(b.quantity) - parseInt(a.quantity);
                if (sortKey === 'name_asc') return a.name.localeCompare(b.name);
                return 0;
            });

            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';

            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No low stock items found.</td></tr>';
                return;
            }

            items.forEach(item => {
                const stock = parseInt(item.quantity);
                const badgeClass = stock === 0 ? 'badge-critical' : 'badge-warning';
                const statusText = stock === 0 ? 'Out of Stock' : 'Low Stock';
                const cost = parseFloat(item.cost || 0).toFixed(2);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge bg-light text-dark border">${item.item_code || '-'}</span></td>
                    <td class="fw-bold text-dark">${item.name}</td>
                    <td class="text-muted small">${item.product_code}</td>
                    <td>Rs. ${cost}</td>
                    <td>
                        <span class="badge ${badgeClass} fs-6">${stock}</span>
                        <small class="text-muted d-block" style="font-size:0.75rem">${statusText}</small>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-primary" onclick="window.open('add_stock.html', '_blank')">
                            <i class="bi bi-plus-lg"></i> Add Stock
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.exportLowStock = function() {
            if (lowStockItems.length === 0) {
                alert('No data to export');
                return;
            }
            let csv = 'Item Code,Product Name,Barcode,Cost,Stock Quantity,Status\n';
            lowStockItems.forEach(item => {
                const stock = parseInt(item.quantity);
                const status = stock === 0 ? 'Out of Stock' : 'Low Stock';
                csv += `"${item.item_code || ''}","${item.name}","${item.product_code}",${item.cost || 0},${stock},"${status}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Low_Stock_Report_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
