<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nelun POS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: #F2F2F7;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h3 {
            font-weight: 700;
            color: #1C1C1E;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #8E8E93;
            font-size: 0.95rem;
        }

        .form-control {
            background-color: #F2F2F7;
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: box-shadow 0.2s;
        }

        .form-control:focus {
            background-color: white;
            box-shadow: 0 0 0 2px #007AFF;
            outline: none;
        }

        .btn-login {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-login:hover {
            background-color: #0062cc;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #8E8E93;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #1C1C1E;
        }

        #alertContainer {
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="mb-3">
                <!-- Icon fallback if image missing -->
                <i class="bi bi-person-circle display-4 text-primary"></i>
            </div>
            <h3>Welcome Back</h3>
            <p>Sign in to access your dashboard</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <input type="text" class="form-control" id="username" placeholder="Username" required autocomplete="username">
            <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
            
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="back-link">
            <a href="index.html"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
        </div>
    </div>

    <!-- Logic -->
    <script>
        // Silent schema init
        fetch('branch_api.php?action=init_schema').catch(e => console.error(e));

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-login');
            const alertBox = document.getElementById('alertContainer');
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(!user || !pass) {
                showAlert('Please fill in all fields.', 'danger');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';

            try {
                const res = await fetch('branch_api.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('user_id', data.user.user_id);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('role', data.user.role);
                    localStorage.setItem('branch_id', data.user.branch_id);
                    localStorage.setItem('branch_name', data.user.branch_name);
                    
                    showAlert('Login Successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 500);
                } else {
                    showAlert(data.message || 'Invalid credentials.', 'danger');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch(err) {
                showAlert('Network error. Cannot connect to API.', 'danger');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        function showAlert(msg, type) {
            const alertBox = document.getElementById('alertContainer');
            alertBox.innerHTML = `
                <div class="alert alert-${type} d-flex align-items-center" role="alert">
                    <i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'} me-2"></i>
                    <div>${msg}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
