<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table th { background-color: #f8f9fa; font-weight: 600; }
        .btn-view { background-color: #e9ecef; border: none; color: #495057; font-weight: 500; }
        .btn-view:hover { background-color: #dee2e6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark m-0"><i class="bi bi-clock-history me-2"></i>Report History</h3>
            <a href="cash-drawer.html" class="btn btn-outline-secondary">Back to Cash Drawer</a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Date & Time</th>
                                <th>Cashier</th>
                                <th class="text-end">Sales (Rs.)</th>
                                <th class="text-end">System Cash (Rs.)</th>
                                <th class="text-end">Difference</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTableBody">
                            <tr><td colspan="6" class="text-center py-5 text-muted">Loading history...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('reportsTableBody');
            
            try {
                const res = await fetch('pos_api.php?action=get_report_history');
                const data = await res.json();
                
                if(data.success && data.reports.length > 0) {
                    tbody.innerHTML = '';
                    data.reports.forEach(report => {
                        const diff = parseFloat(report.difference);
                        const diffClass = diff === 0 ? 'text-muted' : (diff > 0 ? 'text-success' : 'text-danger');
                        const diffSign = diff > 0 ? '+' : '';

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="ps-4">
                                <div class="fw-bold">${report.report_date}</div>
                                <small class="text-muted">${report.report_time}</small>
                            </td>
                            <td>${report.cashier_name}</td>
                            <td class="text-end fw-bold">${parseFloat(report.total_sales).toFixed(2)}</td>
                            <td class="text-end text-muted">${parseFloat(report.cash_in_drawer).toFixed(2)}</td>
                            <td class="text-end fw-bold ${diffClass}">${diffSign}${diff.toFixed(2)}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-view px-3 rounded-pill" onclick='reprintReport(${JSON.stringify(report)})'>
                                    <i class="bi bi-printer me-1"></i> View
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No history found.</td></tr>';
                }
            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-danger">Failed to load history.</td></tr>';
            }
        });

        window.reprintReport = function(report) {
            let reportData = report.report_json;
            // Parse if it came back as a string from DB
            if (typeof reportData === 'string') {
                try { reportData = JSON.parse(reportData); } catch(e) {}
            }
            
            localStorage.setItem('endDayReportData', JSON.stringify(reportData));
            window.open('end_day_receipt.html', '_blank');
        }
    </script>
</body>
</html>
