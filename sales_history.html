<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales History</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-hover tbody tr:hover { background-color: #f8f9fa; }
        .badge-success { background-color: #d1e7dd; color: #0f5132; }
        .badge-warning { background-color: #fff3cd; color: #664d03; }
        
        /* Ensure buttons fit */
        .btn-group-custom .btn {
            margin-right: 4px;
        }
        .btn-group-custom .btn:last-child {
            margin-right: 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0">Sales History</h2>
            <button class="btn btn-primary" onclick="fetchSales(1)">
                <i class="bi bi-arrow-clockwise me-1"></i> Refresh
            </button>
        </div>

        <!-- Filters -->
        <div class="card p-3 mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="form-label fw-bold">From Date</label>
                    <input type="date" class="form-control" id="startDate">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">To Date</label>
                    <input type="date" class="form-control" id="endDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Payment Method</label>
                    <select class="form-select" id="paymentMethodFilter">
                        <option value="All">All Methods</option>
                        <option value="Cash">Cash</option>
                        <option value="Card">Card</option>
                        <option value="Online">Online/Transfer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Search Bill ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-start-0" id="searchId" placeholder="e.g. 1045">
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="fetchSales(1)">Filter</button>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Sales Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Bill ID</th>
                                <th>Date & Time</th>
                                <th>Cashier</th>
                                <th>Method</th>
                                <th class="text-end">Total (Rs.)</th>
                                <th class="text-center" style="min-width: 250px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody">
                            <tr><td colspan="6" class="text-center py-5 text-muted">Loading sales...</td></tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination Controls -->
                <div class="d-flex justify-content-between align-items-center p-3 border-top">
                    <span class="text-muted small" id="pageInfo">Showing 0-0 of 0</span>
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary btn-sm" id="prevBtn" onclick="changePage(-1)" disabled>
                            <i class="bi bi-chevron-left"></i> Prev
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" id="nextBtn" onclick="changePage(1)" disabled>
                            Next <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sale Details Modal -->
    <div class="modal fade" id="saleDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Bill Details #<span id="modalBillId"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-sm">
                        <thead><tr><th>Item</th><th>Qty</th><th class="text-end">Total</th></tr></thead>
                        <tbody id="modalItemsBody"></tbody>
                    </table>
                    <div class="d-flex justify-content-between mt-3 fw-bold border-top pt-2">
                        <span>Total:</span>
                        <span>Rs. <span id="modalTotal">0.00</span></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="reprintBtn"><i class="bi bi-printer"></i> Reprint</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Init Dates
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;

        let currentSaleData = null; // Store for reprint
        const modal = new bootstrap.Modal(document.getElementById('saleDetailsModal'));
        
        // Pagination State
        let currentPage = 1;
        let totalPages = 1;
        const itemsPerPage = 20;

        document.addEventListener('DOMContentLoaded', () => fetchSales(1));

        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage > 0 && newPage <= totalPages) {
                fetchSales(newPage);
            }
        }

        async function fetchSales(page = 1) {
            currentPage = page;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const id = document.getElementById('searchId').value.trim();
            const method = document.getElementById('paymentMethodFilter').value;
            const tbody = document.getElementById('salesTableBody');

            // Set loading state
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">Loading...</td></tr>';

            try {
                let url = `sales.php?action=getSalesHistory&start=${start}&end=${end}&payment_method=${method}&page=${page}&limit=${itemsPerPage}`;
                if(id) url = `sales.php?action=getSalesHistory&id=${id}&page=${page}&limit=${itemsPerPage}`;

                const res = await fetch(url);
                const data = await res.json();

                if(data.success) {
                    tbody.innerHTML = '';
                    
                    if(!data.sales || data.sales.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No sales found.</td></tr>';
                        document.getElementById('pageInfo').innerText = 'No records';
                        return;
                    }
                    
                    data.sales.forEach(sale => {
                        const tr = document.createElement('tr');
                        
                        let badgeClass = 'bg-secondary';
                        if(sale.payment_method === 'Cash') badgeClass = 'bg-success';
                        else if(sale.payment_method === 'Card') badgeClass = 'bg-primary';
                        else if(sale.payment_method === 'Hold') badgeClass = 'bg-warning text-dark';

                        tr.innerHTML = `
                            <td><span class="badge bg-light text-dark border">${sale.sale_id}</span></td>
                            <td>
                                <div>${sale.sale_date}</div>
                                <small class="text-muted">${sale.sale_time}</small>
                            </td>
                            <td>${sale.username || 'Admin'}</td>
                            <td><span class="badge ${badgeClass}">${sale.payment_method}</span></td>
                            <td class="text-end fw-bold">Rs. ${parseFloat(sale.total_amount).toFixed(2)}</td>
                            <td class="text-center btn-group-custom">
                                <button class="btn btn-sm btn-outline-warning" onclick="editSale(${sale.sale_id})">
                                    <i class="bi bi-pencil"></i> Edit
                                </button>
                                <button class="btn btn-sm btn-outline-primary" onclick="viewSale(${sale.sale_id})">
                                    <i class="bi bi-eye"></i> View
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteSale(${sale.sale_id})">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    // Update Pagination Controls
                    totalPages = data.pagination.total_pages;
                    const totalRecords = data.pagination.total_records;
                    document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages} (Total: ${totalRecords})`;
                    
                    document.getElementById('prevBtn').disabled = currentPage <= 1;
                    document.getElementById('nextBtn').disabled = currentPage >= totalPages;

                } else {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">${data.message}</td></tr>`;
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">Network error.</td></tr>';
            }
        }

        // --- EDIT LOGIC ---
        window.editSale = function(saleId) {
            if(confirm('Do you want to open Bill #' + saleId + ' in the POS Panel for editing?')) {
                // Store the ID in localStorage so POS Panel can pick it up
                localStorage.setItem('edit_sale_id', saleId);
                // Redirect or Open POS Panel
                window.open('pos-panel.html', '_self'); // Open in same tab or use _blank
            }
        };

        // --- VIEW LOGIC ---
        async function viewSale(id) {
            try {
                const res = await fetch(`sales.php?action=getSaleDetails&sale_id=${id}`);
                const data = await res.json();
                if(data.success) {
                    currentSaleData = data;
                    document.getElementById('modalBillId').innerText = data.sale.sale_id;
                    document.getElementById('modalTotal').innerText = parseFloat(data.sale.total_amount).toFixed(2);
                    
                    const itemsBody = document.getElementById('modalItemsBody');
                    itemsBody.innerHTML = '';
                    data.items.forEach(item => {
                        itemsBody.innerHTML += `
                            <tr>
                                <td>${item.name}</td>
                                <td>${item.qty}</td>
                                <td class="text-end">${parseFloat(item.total).toFixed(2)}</td>
                            </tr>
                        `;
                    });
                    modal.show();
                } else {
                    alert(data.message || 'Error loading details');
                }
            } catch(e) { alert('Network error loading details'); }
        }

        // --- DELETE LOGIC ---
        async function deleteSale(id) {
            if(!confirm(`Are you sure you want to delete Sale #${id}?\n\nThis will:\n1. Remove the sale record.\n2. Restore stock quantity.\n3. Remove from cash drawer reports.\n\nThis action cannot be undone.`)) {
                return;
            }

            try {
                const res = await fetch('sales.php?action=deleteSale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ sale_id: id })
                });
                const data = await res.json();
                
                if(data.success) {
                    showAlert(data.message, 'success');
                    fetchSales(currentPage); // Refresh current page
                } else {
                    showAlert('Error: ' + data.message, 'danger');
                }
            } catch(e) {
                showAlert('Network error deleting sale.', 'danger');
            }
        }

        // Reprint Logic
        document.getElementById('reprintBtn').addEventListener('click', () => {
            if(!currentSaleData) return;
            // Map data to receipt format
            const receiptData = {
                billNo: currentSaleData.sale.sale_id,
                cashier: currentSaleData.sale.cashier_name,
                customer: 'Walk-in (Reprint)',
                paymentMethod: currentSaleData.sale.payment_method,
                date: currentSaleData.sale.sale_date,
                time: currentSaleData.sale.sale_time,
                items: currentSaleData.items,
                totalItems: currentSaleData.items.reduce((sum, i) => sum + parseInt(i.qty), 0),
                grossSubtotal: parseFloat(currentSaleData.sale.total_amount) + parseFloat(currentSaleData.sale.discount_amount),
                billDiscount: currentSaleData.sale.discount_amount,
                grandTotal: currentSaleData.sale.total_amount,
                paidAmount: currentSaleData.sale.total_amount,
                balanceAmount: 0
            };
            localStorage.setItem('currentReceiptData', JSON.stringify(receiptData));
            window.open('receipt.html', '_blank', 'width=400,height=600');
        });

        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = `alert alert-${type} alert-dismissible fade show fixed-top m-3`;
            div.style.zIndex = 1060;
            div.style.maxWidth = '400px';
            div.style.left = 'auto';
            div.innerHTML = `${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
    </script>
</body>
</html>
